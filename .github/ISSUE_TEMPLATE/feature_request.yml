name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would this help your research workflow?
    validations:
      required: true
  - type: dropdown
    id: contribute
    attributes:
      label: Would you be willing to contribute a PR?
      options:
        - "Yes"
        - "No"
        - Maybe — I'd need guidance
    validations:
      required: true
